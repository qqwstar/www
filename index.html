<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Salt Blue Puzzle Maker - PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --sea-salt-main: #A8D1E7;  /* 核心海盐蓝 */
            --sea-salt-deep: #5B8DA5;  /* 深海蓝，用于文字和强调 */
            --bg-light: #F4F7F9;        /* 整体背景 */
            --white: #FFFFFF;
            --border-color: #E1E8ED;
            --text-main: #333333;
            --sold-red: rgba(255, 71, 87, 0.85); /* “卖光了”蒙层红 */
            --transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; color: var(--text-main);
            overflow: hidden;
        }

        /* --- 顶部通栏导航 (基于 UI 图) --- */
        header {
            background-color: var(--white);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .header-logo {
            display: flex; align-items: center; gap: 10px;
            color: var(--sea-salt-deep); font-weight: bold; font-size: 1.1rem;
        }

        .header-logo i { font-size: 1.4rem; }

        .header-actions { display: flex; gap: 10px; }
        .icon-btn-top {
            background: transparent; border: none; color: #888;
            font-size: 1.2rem; cursor: pointer; transition: var(--transition);
        }
        .icon-btn-top:hover { color: var(--sea-salt-deep); }

        /* --- 主体布局 (左工具栏，右预览区) --- */
        .main-container {
            flex: 1; display: flex; overflow: hidden; padding: 20px; gap: 20px;
        }

        /* 左侧工具栏 */
        .toolbar {
            width: 320px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto;
        }

        /* 右侧大预览区 */
        .preview-area {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background-color: var(--white); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            overflow: auto; padding: 40px; position: relative;
        }

        /* 专业卡片样式 */
        .tool-card {
            background-color: var(--white); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(168, 209, 231, 0.2);
        }

        .card-title {
            font-size: 0.9rem; color: #777; margin-bottom: 15px; display: block;
        }

        /* 统一按钮样式 */
        .opt-btn {
            background-color: #F0F4F7; border: 1px solid transparent; color: #555;
            padding: 10px; border-radius: 8px; font-size: 0.85rem;
            cursor: pointer; transition: var(--transition); text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .opt-btn:hover { background-color: #EBF0F3; }
        .opt-btn.active {
            background-color: var(--sea-salt-main); color: var(--white);
            border-color: var(--sea-salt-deep); font-weight: bold;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* 滑块优化 */
        .slider-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .slider-label { font-size: 0.8rem; color: #888; }
        input[type=range] {
            width: 100%; cursor: pointer; -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #E1E8ED; height: 6px; border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px;
            background: var(--sea-salt-deep); border-radius: 50%;
            margin-top: -5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 价格卡片细节 */
        .price-list { font-size: 0.85rem; color: #666; display: flex; flex-direction: column; gap: 8px; }
        .price-item { display: flex; justify-content: space-between; }
        .total-price {
            font-size: 1.6rem; color: #FF7E5F; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            background-color: #FFF0ED; padding: 10px; border-radius: 8px; margin-top: 15px;
        }

        .purchase-btn {
            background-color: var(--sea-salt-deep); color: var(--white);
            border: none; padding: 15px; border-radius: 10px; width: 100%;
            font-size: 1rem; cursor: pointer; margin-top: 15px; transition: var(--transition);
        }
        .purchase-btn:hover { background-color: #4a758a; }

        /* --- 核心：3x3 完美九宫格九帝 Canvas 容器 --- */
        #puzzle-canvas-wrapper {
            display: grid; 
            /* 初始默认 3 列，JS 会根据图片数量动态调整为 3x3 排版 */
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; /* 女帝图细缝 */
            width: 94%; max-width: 600px;
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #fff; /* 防止背景色透出 */
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Canvas 上的图片格子 (由 JS 生成) */
        .puzzle-grid-slot {
            position: relative; overflow: hidden; cursor: grab;
            border-radius: 8px; width: 100%;
        }
        .puzzle-grid-slot img {
            width: 100%; height: 100%; object-fit: cover; pointer-events: none;
        }

        /* 比例动态调整 */
        .ratio-1-1 .puzzle-grid-slot { aspect-ratio: 1/1; }
        .ratio-3-4 .puzzle-grid-slot { aspect-ratio: 3/4; }
        .ratio-16-9 .puzzle-grid-slot { aspect-ratio: 16/9; }

        /* --- “卖光了” 蒙层 --- */
        .sold-overlay {
            position: absolute; inset: 0; background: var(--sold-red);
            display: none; align-items: center; justify-content: center; z-index: 20;
        }
        .sold-overlay span {
            color: white; font-size: 1.2rem; font-weight: bold;
            border: 2px solid white; padding: 2px 8px; transform: rotate(-15deg); text-transform: uppercase;
        }
        .puzzle-grid-slot.is-sold .sold-overlay { display: flex; }

        /* --- 图片上的价格标签 --- */
        .price-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(168, 209, 231, 0.9); color: white;
            padding: 4px 12px; border-radius: 20px; font-weight: bold;
            font-size: 0.9rem; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            display: none; /* 默认隐藏 */
            z-index: 10; pointer-events: none;
        }
        .puzzle-grid-slot.show-price .price-badge { display: block; }

        /* 单图工具按钮组 */
        .slot-tools {
            position: absolute; bottom: 8px; right: 8px;
            display: flex; gap: 5px; z-index: 30;
        }
        .tool-btn {
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.9); display: flex;
            align-items: center; justify-content: center;
            color: var(--deep-sea); cursor: pointer; font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 顶部通栏导航细节 */
        .header-logo i { font-size: 1.4rem; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">
        <i class="fas fa-layer-group"></i>
        <span>Sea Salt Blue Puzzle Maker - Result Preview</span>
    </div>
    <div class="header-actions">
        <span style="color: #777; font-size: 0.8rem; margin-right: 15px;">九九九九选帝 selected</span>
        <i class="fas fa-save icon-btn" onclick="downloadPuzzle()"></i>
        <i class="fas fa-redo-alt icon-btn" onclick="location.reload()"></i>
        <i class="fas fa-trash-alt icon-btn" style="color: #ff7675;"></i>
    </div>
</header>

<div class="main-container">
    <div class="toolbar">
        <div class="tool-card">
            <label class="opt-btn active" style="width: 100%; box-sizing: border-box;">
                <i class="fas fa-cloud-upload-alt"></i> Upload 九九九帝素材图片 (批量导入)
                <input type="file" id="imageFiles" multiple accept="image/*" hidden>
            </label>
        </div>

        <div class="tool-card">
            <span class="card-title">Choose puzzle ratio:</span>
            <div class="flex-row">
                <button class="opt-btn active" onclick="setRatio(this, 'ratio-3-4')">3:4经典</button>
                <button class="opt-btn" onclick="setRatio(this, 'ratio-1-1')">1:1九格</button>
                <button class="opt-btn" onclick="setRatio(this, 'ratio-16-9')">电影感长图</button>
            </div>
            <div class="slider-container">
                <span class="slider-label">Crop Size (大局部显示灵敏度)</span>
                <input type="range" min="10" max="100" value="50">
            </div>
        </div>

        <div class="tool-card">
            <span class="card-title">标价设定与一键加价</span>
            <div class="flex-row">
                <div class="price-input-wrap" style="flex:1.5; background:#FFF0ED; display:flex; align-items:center; padding:5px 12px; border-radius:10px;">
                    <span style="font-size:0.8rem; color:#888; margin-right:5px;">单价 ¥</span>
                    <input type="number" id="unitPrice" value="9.90" step="0.1" style="background:transparent; border:none; outline:none; color:#FF7E5F; font-weight:bold; font-size:1rem;" oninput="updateAllPrices()">
                </div>
                <div style="font-size: 0.75rem; color: #aaa; flex:1;">点击图上图标 一键贴价</div>
            </div>
        </div>

        <div class="tool-card">
            <div class="btn-grid">
                <button class="opt-btn active"><i class="fas fa-check"></i> 销售复盘</button>
                <button class="opt-btn"><i class="fas fa-tag"></i> 价格蒙层</button>
            </div>
            <label class="opt-btn" style="margin-top: 15px; width: 100%; box-sizing: border-box; background: var(--bg-light); border: 1px dashed var(--sea-salt-main);">
                <i class="fas fa-stamp"></i> 自定义销售水印
                <input type="file" id="watermarkFile" accept="image/*" hidden>
            </label>
            <div style="margin-top: 15px; font-size: 0.75rem; color: #aaa;">支持本地图片，上传即存本地</div>
        </div>

        <div class="tool-card" style="margin-top: auto;">
            <div class="price-list">
                <div class="price-item"><span>Price (per slot):</span> <span>¥9.90</span></div>
                <div class="price-item"><span>Slot Count:</span> <span id="slot-count">0</span></div>
            </div>
            <div class="total-price">TOTAL: ¥ <span id="total-price-val">0.00</span></div>
            <button class="purchase-btn" onclick="alert('高清渲染导出中...')">Purchase & Download作品</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="puzzle-canvas-wrapper" class="ratio-3-4">
            <div id="placeholder" style="color: #ccc; font-size: 1rem; text-align: center; padding: 100px;">等待批量导入九九帝生成3x3完美排版预览...</div>
        </div>
    </div>
</div>

<script>
    const wrapper = document.getElementById('puzzle-canvas-wrapper');
    const fileInput = document.getElementById('imageFiles');
    const unitPriceInput = document.getElementById('unitPrice');
    let imgFiles = [];
    const unitPrice = 9.90; // 默认单价

    imgInput.addEventListener('change', function() {
        imgFiles = Array.from(this.files);
        if(!imgFiles.length) return;
        renderGrid();
    });

    // --- 3x3 九宫格排版逻辑 ---
    function renderGrid() {
        document.getElementById('placeholder').style.display = 'none';
        wrapper.querySelectorAll('.puzzle-grid-slot').forEach(s => s.remove());

        // 计算网格行列：9张图生成3x3，4张生成2x2，以此类推
        const cols = imgFiles.length <= 2 ? 1 : (imgFiles.length <= 4 ? 2 : 3);
        wrapper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        // 核心：大局部显示尺寸映射
        const baseWidth = window.innerWidth > 600 ? 600 : window.innerWidth - 60;
        const slotWidth = baseWidth / cols;

        imgFiles.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const slot = document.createElement('div');
                slot.className = 'puzzle-grid-slot';
                
                slot.innerHTML = `
                    <div class="sold-overlay"><span>卖光了</span></div>
                    <div class="price-badge">¥ ${parseFloat(unitPriceInput.value).toFixed(2)}</div>
                    <div class="slot-tools">
                        <div class="tool-btn" onclick="this.closest('.puzzle-grid-slot').classList.toggle('show-price')"><i class="fas fa-tag"></i></div>
                        <div class="tool-btn" onclick="this.closest('.puzzle-grid-slot').classList.toggle('is-sold')"><i class="fas fa-check"></i></div>
                    </div>
                    <img src="${e.target.result}" style="object-position: 50% 50%">
                `;
                
                wrapper.appendChild(slot);

                // 自由裁剪调整
                const img = slot.querySelector('img');
                let offset = { x: 0, y: 0 };
                interact(slot).draggable({
                    listeners: { move(event) {
                        offset.x += event.dx; offset.y += event.dy;
                        img.style.objectPosition = `${50 + offset.x/2}% ${50 + offset.y/2}%`;
                    }}
                });
            };
            reader.readAsDataURL(file);
        });
        updateTotal();
    }

    function updateTotal() {
        const unit = parseFloat(unitPriceInput.value) || 0;
        document.getElementById('slot-count').innerText = imgFiles.length;
        document.getElementById('total-price-val').innerText = (imgFiles.length * unit).toFixed(2);
    }

    // 比例切换：需要重新触发JS排版
    function setRatio(btn, ratio) {
        document.querySelectorAll('.flex-row .opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        wrapper.className = ratio;
        // 如果已经有图，重新触发布局逻辑
        if(imgFiles.length > 0) renderGrid();
    }

    function updateAllPrices() {
        const val = parseFloat(unitPriceInput.value) || 0;
        document.querySelectorAll('.price-badge').forEach(b => {
            b.innerText = `¥ ${val.toFixed(2)}`;
        });
        updateTotal();
    }
</script>
</body>
</html>
