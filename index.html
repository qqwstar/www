<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>角色卡画廊 | 全局共享</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/font-awesome@4.7.0/css/font-awesome.min.css"/>
<script>
tailwind.config={
  theme:{
    extend:{
      colors:{
        mainBlue:'#3b82f6',
        bgLight:'#f1f5f9',
        textDark:'#1e293b'
      }
    }
  }
}
</script>
<style>
body{background:#f1f5f9;}
.page{display:none;}
.page.active{display:block;}
.card-hover{transition:0.3s ease;}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 10px 25px #3b82f638;}
.btn-interactive{transition: all 0.2s ease;}
.btn-interactive:hover{opacity:0.9;}
.btn-interactive:active{transform:scale(0.95);}
/* 底部中间加号永久保留动画 */
.plus-btn{transform: translateY(-12px);transition:0.2s;}
.plus-btn:active{transform:translateY(-12px) scale(0.95);}
input,textarea{outline:none;}
.tab{transition:0.2s;}
.tab:active{scale:0.95;}
.tab-active{background:#3b82f6;color:#fff;}
#refreshTip{transition:0.3s;}
</style>
</head>
<body class="text-textDark bg-bgLight pb-24 overflow-x-hidden">

<!-- 首页 -->
<div id="homePage" class="page active">
  <header class="py-6 text-center">
    <h1 class="text-3xl font-bold text-mainBlue">角色卡画廊</h1>
    <p class="text-slate-500 mt-1">下拉刷新 · 全局共享 · 分区浏览</p>
  </header>
  <div id="refreshTip" class="text-center py-2 text-mainBlue hidden">
    <i class="fa fa-refresh fa-spin"></i> 同步最新内容中...
  </div>
  <div class="flex justify-center gap-2 px-4 mb-6">
    <button onclick="switchTab('星野')" class="tab px-5 py-2 rounded-full border border-mainBlue tab-active">星野</button>
    <button onclick="switchTab('mufy')" class="tab px-5 py-2 rounded-full border border-mainBlue">mufy</button>
    <button onclick="switchTab('kira')" class="tab px-5 py-2 rounded-full border border-mainBlue">kira</button>
  </div>
  <div class="max-w-6xl mx-auto px-4">
    <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5"></div>
  </div>
</div>

<!-- 个人主页 -->
<div id="userPage" class="page">
  <div class="max-w-xl mx-auto px-4 pt-10">
    <div class="bg-white rounded-2xl p-6 text-center shadow-md">
      <div class="relative inline-block">
        <img id="userAvatar" class="w-24 h-24 rounded-full object-cover mx-auto border-2 border-mainBlue">
        <label class="absolute bottom-0 right-0 bg-mainBlue w-7 h-7 rounded-full flex items-center justify-center cursor-pointer btn-interactive">
          <i class="fa fa-camera text-white text-sm"></i>
          <input type="file" accept="image/*" class="hidden" onchange="changeAvatar(event)">
        </label>
      </div>
      <input id="userName" type="text" placeholder="输入昵称"
      class="mt-4 bg-transparent text-2xl font-bold text-center border-b border-slate-300 w-4/5 focus:border-mainBlue"
      onblur="saveUserInfo()">
      <textarea id="userBio" rows="3" placeholder="写下你的个人简介..."
      class="mt-4 w-full bg-slate-100 rounded-lg p-3 resize-none"
      onblur="saveUserInfo()"></textarea>
      <p class="text-slate-600 mt-4">我的发布：<span id="myCardCount">0</span>｜个人屏蔽：<span id="blockCount">0</span></p>
      <button onclick="openBlockList()" class="btn-interactive mt-3 bg-mainBlue px-4 py-1 rounded-lg text-white text-sm">查看屏蔽列表</button>
    </div>
    <h3 class="mt-8 text-xl text-slate-700">我的发布</h3>
    <div id="myCardGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-4"></div>
  </div>
</div>

<!-- 屏蔽列表弹窗 -->
<div id="blockModal" class="fixed inset-0 bg-black/60 z-50 hidden p-5 overflow-auto">
  <div class="max-w-md mx-auto bg-white rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-slate-700">个人屏蔽管理</h2>
      <button onclick="closeBlockList()" class="btn-interactive text-2xl text-slate-500"><i class="fa fa-times"></i></button>
    </div>
    <div id="blockList" class="space-y-3"></div>
  </div>
</div>

<!-- 底部导航 -->
<div class="fixed bottom-0 left-0 w-full bg-white shadow-lg border-t border-slate-200 flex items-center justify-around py-2 z-40">
  <button onclick="switchPage('home')" class="btn-interactive flex-1 py-3 text-center text-slate-600">
    <i class="fa fa-th-large block text-xl"></i><span class="text-sm">首页</span>
  </button>
  <button onclick="openUploadModal()" class="plus-btn w-14 h-14 rounded-full bg-mainBlue flex items-center justify-center text-white text-2xl">
    <i class="fa fa-plus"></i>
  </button>
  <button onclick="switchPage('user')" class="btn-interactive flex-1 py-3 text-center text-slate-600">
    <i class="fa fa-user block text-xl"></i><span class="text-sm">我的</span>
  </button>
</div>

<!-- 发布弹窗｜草稿保留、返回按钮、全局同步发布 -->
<div id="uploadModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-2xl p-6">
    <h2 class="text-xl mb-2 font-bold text-slate-700">发布全局角色卡</h2>
    <p class="text-xs text-slate-500 mb-3">草稿自动保存 · 发布所有人可见</p>
    <div class="flex gap-2 mb-4">
      <label class="text-sm text-slate-600"><input name="cate" type="radio" value="星野" checked class="mr-1">星野</label>
      <label class="text-sm text-slate-600"><input name="cate" type="radio" value="mufy" class="mr-1">mufy</label>
      <label class="text-sm text-slate-600"><input name="cate" type="radio" value="kira" class="mr-1">kira</label>
    </div>
    <input type="file" id="imgUpload" accept="image/*" class="w-full bg-slate-100 rounded-lg p-3 mb-3">
    <div id="draftPreview" class="hidden mb-3">
      <img id="draftImg" class="w-32 h-32 object-cover rounded-lg">
    </div>
    <textarea id="descInput" rows="4" class="w-full bg-slate-100 rounded-lg p-3 resize-none" placeholder="角色简介..."></textarea>
    <div class="mt-5 flex gap-3">
      <button onclick="closeUploadModal()" class="btn-interactive flex-1 bg-slate-400 text-white py-2 rounded-lg">返回</button>
      <button onclick="clearDraft()" class="btn-interactive flex-1 bg-red-500 text-white py-2 rounded-lg">清空草稿</button>
      <button onclick="publishCard()" class="btn-interactive flex-1 bg-mainBlue text-white py-2 rounded-lg">发布</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div id="detailModal" class="fixed inset-0 bg-black/60 z-50 hidden p-5 overflow-auto">
  <button onclick="closeDetailModal()" class="btn-interactive float-right text-3xl mb-4 text-white"><i class="fa fa-times"></i></button>
  <div class="max-w-lg w-full mx-auto">
    <img id="modalImg" class="w-full max-h-[60vh] object-contain rounded-xl">
    <p class="text-slate-200 text-sm mt-2">分区：<span id="detailCate"></span></p>
    <p id="modalDesc" class="mt-3 text-white whitespace-pre-wrap"></p>
    <div class="mt-6 flex gap-3">
      <button id="delBtn" onclick="confirmDelete()" class="btn-interactive flex-1 bg-red-600 text-white py-3 rounded-lg">
        <i class="fa fa-trash mr-1"></i> 删除我的卡片
      </button>
      <button onclick="confirmBlockCard()" class="btn-interactive flex-1 bg-orange-500 text-white py-3 rounded-lg">
        <i class="fa fa-ban mr-1"></i> 屏蔽卡片
      </button>
      <button onclick="confirmBlockAuthor()" class="btn-interactive flex-1 bg-blue-700 text-white py-3 rounded-lg">
        <i class="fa fa-user-times mr-1"></i> 屏蔽作者
      </button>
    </div>
  </div>
</div>

<script>
let tempImg = "";
let nowTab = "星野";
let currentCard = null;

// 全局共用角色卡存储（所有用户共享）
const GLOBAL_CARD_KEY = "globalAllCards";
// 个人屏蔽存储（独立互不影响）
const BLOCK_KEY = "userBlockList";
// 个人草稿
const DRAFT_KEY = "cardDraft";
// 个人资料
const USER_KEY = "userProfile";

// 下拉刷新 同步全局最新
let startY=0;
document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY})
document.addEventListener('touchmove',e=>{
  let moveY=e.touches[0].clientY;
  if(window.scrollY<=0 && moveY-startY>60){
    document.getElementById('refreshTip').classList.remove('hidden')
  }
})
document.addEventListener('touchend',()=>{
  if(window.scrollY<=0){
    setTimeout(()=>{
      renderHomeCards();
      document.getElementById('refreshTip').classList.add('hidden')
    },600)
  }
})

// 全局角色卡读写
function getGlobalCards(){
  let data = localStorage.getItem(GLOBAL_CARD_KEY);
  if(!data) return {"星野":[],"mufy":[],"kira":[]};
  return JSON.parse(data);
}
function saveGlobalCards(obj){
  localStorage.setItem(GLOBAL_CARD_KEY, JSON.stringify(obj));
}

// 个人屏蔽
function getBlockList(){
  return JSON.parse(localStorage.getItem(BLOCK_KEY))||{cards:[],authors:[]}
}
function saveBlockList(list){
  localStorage.setItem(BLOCK_KEY,JSON.stringify(list))
}

// 过滤当前用户屏蔽内容
function getFilteredCards(){
  let all = getGlobalCards();
  let block = getBlockList();
  Object.keys(all).forEach(cate=>{
    all[cate] = all[cate].filter(c=>!block.cards.includes(c.id) && !block.authors.includes(c.authorId))
  })
  return all;
}

// 分区切换
function switchTab(name){
  nowTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('tab-active'));
  event.target.classList.add('tab-active');
  renderHomeCards();
}

// 草稿
function getDraft(){return JSON.parse(localStorage.getItem(DRAFT_KEY))||{img:"",desc:""}}
function autoSaveDraft(){
  let d={img:tempImg,desc:document.getElementById("descInput").value}
  localStorage.setItem(DRAFT_KEY,JSON.stringify(d))
}
function loadDraft(){
  let d=getDraft();
  tempImg=d.img;
  document.getElementById("descInput").value=d.desc;
  if(d.img){
    document.getElementById("draftImg").src=d.img;
    document.getElementById("draftPreview").classList.remove("hidden")
  }
}
function clearDraft(){
  localStorage.removeItem(DRAFT_KEY);
  tempImg="";
  document.getElementById("imgUpload").value="";
  document.getElementById("descInput").value="";
  document.getElementById("draftPreview").classList.add("hidden");
}

// 用户资料
function getUserInfo(){return JSON.parse(localStorage.getItem(USER_KEY))||{avatar:"",name:"匿名",bio:"暂无简介"}}
function saveUserInfo(){
  let u=getUserInfo();
  u.name=document.getElementById("userName").value;
  u.bio=document.getElementById("userBio").value;
  localStorage.setItem(USER_KEY,JSON.stringify(u));
}
function changeAvatar(e){
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=res=>{
    let u=getUserInfo();u.avatar=res.target.result;
    localStorage.setItem(USER_KEY,JSON.stringify(u));
    document.getElementById("userAvatar").src=res.target.result
  }
  r.readAsDataURL(f)
}
function loadUserProfile(){
  let u=getUserInfo();
  document.getElementById("userAvatar").src=u.avatar||"https://api.dicebear.com/7.x/adventurer/svg?seed=user";
  document.getElementById("userName").value=u.name;
  document.getElementById("userBio").value=u.bio;
}

// 页面切换
function switchPage(type){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'))
  if(type==='home'){
    document.getElementById('homePage').classList.add('active');
    renderHomeCards();
  }
  if(type==='user'){
    document.getElementById('userPage').classList.add('active');
    loadUserProfile();
    renderUserPage();
  }
}

// 发布弹窗开关
function openUploadModal(){loadDraft();document.getElementById('uploadModal').classList.remove('hidden')}
function closeUploadModal(){autoSaveDraft();document.getElementById("uploadModal").classList.add("hidden")}

// 图片预览草稿
document.getElementById("imgUpload").addEventListener("change",e=>{
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=ev=>{
    tempImg = ev.target.result;
    document.getElementById("draftImg").src = tempImg;
    document.getElementById("draftPreview").classList.remove("hidden");
    autoSaveDraft();
  }
  r.readAsDataURL(f)
})
document.getElementById('descInput').addEventListener('input', autoSaveDraft);

// 【全局发布核心】发布后所有用户首页实时可见
function publishCard(){
  let desc = document.getElementById("descInput").value.trim();
  let cateEle = document.querySelector('input[name="cate"]:checked');
  if(!tempImg){
    alert("请先上传角色图片");
    return;
  }
  if(!desc){
    alert("请填写角色简介");
    return;
  }
  if(!cateEle){
    alert("请选择分区");
    return;
  }
  let cate = cateEle.value;
  let user = getUserInfo();
  let globalData = getGlobalCards();

  // 携带作者信息，存入全局共享库
  let newItem = {
    img: tempImg,
    desc: desc,
    category: cate,
    id: Date.now(),
    author: user.name || "匿名用户",
    authorId: user.name || "匿名用户"
  };

  globalData[cate].push(newItem);
  saveGlobalCards(globalData);

  clearDraft();
  closeUploadModal();
  renderHomeCards();
}

// 首页渲染：加载全局共享 + 过滤个人屏蔽
function renderHomeCards(){
  let all = getFilteredCards();
  let list = all[nowTab]||[];
  let wrap = document.getElementById("cardGrid");
  wrap.innerHTML="";
  list.forEach(item=>{
    let div=document.createElement('div');
    div.className="bg-white rounded-xl overflow-hidden shadow-sm card-hover cursor-pointer";
    div.onclick=()=>openDetail(item);
    div.innerHTML=`
      <img src="${item.img}" class="w-full h-52 object-cover">
      <div class="p-3">
        <p class="text-sm text-slate-700 line-clamp-2">${item.desc}</p>
        <p class="text-xs text-slate-400 mt-1">by ${item.author}</p>
      </div>
    `;
    wrap.appendChild(div);
  })
}

// 个人页面：只显示自己发布的卡片
function renderUserPage(){
  let me = getUserInfo();
  let allGlobal = getGlobalCards();
  let myAll = [];
  Object.values(allGlobal).forEach(arr=>{
    myAll.push(...arr.filter(x=>x.authorId === me.name))
  });
  let block = getBlockList();
  document.getElementById("myCardCount").innerText = myAll.length;
  document.getElementById("blockCount").innerText = block.cards.length+block.authors.length;

  let wrap = document.getElementById("myCardGrid");
  wrap.innerHTML="";
  myAll.forEach(item=>{
    let d=document.createElement('div');
    d.className="bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer";
    d.onclick=()=>openDetail(item);
    d.innerHTML=`<img src="${item.img}" class="w-full h-40 object-cover">`;
    wrap.appendChild(d);
  })
}

// 详情弹窗
function openDetail(item){
  currentCard=item;
  let me = getUserInfo();
  // 不是自己的卡片隐藏删除按钮
  document.getElementById("delBtn").style.display = (item.authorId === me.name) ? "block":"none";

  document.getElementById("modalImg").src=item.img;
  document.getElementById("modalDesc").innerText=item.desc;
  document.getElementById("detailCate").innerText=item.category+" · by "+item.author;
  document.getElementById("detailModal").classList.remove('hidden')
}
function closeDetailModal(){
  document.getElementById("detailModal").classList.add('hidden');
  currentCard=null;
}

// 删除：仅自己能删除自己发布，全局同步删除
function confirmDelete(){
  if(!currentCard)return;
  if(!confirm("确定删除你的角色卡？全局同步删除"))return;
  let global = getGlobalCards();
  global[currentCard.category] = global[currentCard.category].filter(x=>x.id !== currentCard.id);
  saveGlobalCards(global);

  closeDetailModal();
  renderHomeCards();
  renderUserPage();
}

// 屏蔽
function confirmBlockCard(){
  if(!currentCard)return;
  let b=getBlockList();
  if(b.cards.includes(currentCard.id)) return;
  b.cards.push(currentCard.id);
  saveBlockList(b);
  closeDetailModal();
  renderHomeCards();
}
function confirmBlockAuthor(){
  if(!currentCard)return;
  let b=getBlockList();
  if(b.authors.includes(currentCard.authorId))return;
  b.authors.push(currentCard.authorId);
  saveBlockList(b);
  closeDetailModal();
  renderHomeCards();
}

// 屏蔽列表
function openBlockList(){
  let b=getBlockList();
  let el=document.getElementById("blockList");
  el.innerHTML="";
  if(b.cards.length===0&&b.authors.length===0){
    el.innerHTML="<p class='text-slate-500 text-center py-4'>暂无屏蔽内容</p>";
    document.getElementById("blockModal").classList.remove("hidden");
    return;
  }
  b.cards.forEach(id=>{
    let d=document.createElement("div");
    d.className="p-3 bg-slate-100 rounded-lg flex justify-between";
    d.innerHTML=`<span>卡片ID:${id}</span><button onclick="unblockCard(${id})" class="text-mainBlue btn-interactive">解除</button>`;
    el.appendChild(d);
  })
  b.authors.forEach(name=>{
    let d=document.createElement("div");
    d.className="p-3 bg-slate-100 rounded-lg flex justify-between";
    d.innerHTML=`<span>作者:${name}</span><button onclick="unblockAuthor('${name}')" class="text-mainBlue btn-interactive">解除</button>`;
    el.appendChild(d);
  })
  document.getElementById("blockModal").classList.remove("hidden");
}
function closeBlockList(){document.getElementById("blockModal").classList.add("hidden")}
function unblockCard(id){
  let b=getBlockList();
  b.cards=b.cards.filter(x=>x!==id);
  saveBlockList(b);
  openBlockList();
  renderHomeCards();
}
function unblockAuthor(name){
  let b=getBlockList();
  b.authors=b.authors.filter(x=>x!==name);
  saveBlockList(b);
  openBlockList();
  renderHomeCards();
}

window.onload=renderHomeCards();
</script>
</body>
</html>
