<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海盐蓝竖屏拼图工坊</title>
    <style>
        :root {
            --sea-salt-blue: #A8D1E7; /* 主色：清透浅蓝 */
            --deep-sea: #5B8DA5;     /* 强调色：海浪深蓝 */
            --bg-color: #F0F7FA;       /* 背景：极淡蓝白 */
            --panel-color: #FFFFFF;  /* 容器：纯白 */
            --text-color: #333333;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--sea-salt-blue); /* 整体背景使用海盐蓝 */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* 水平居中 */
            min-height: 100vh;
        }

        /* 模拟手机竖屏容器 */
        .phone-container {
            width: 100%;
            max-width: 480px; /* 限制最大宽度，保持竖屏感 */
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 顶部导航 */
        header {
            background-color: var(--panel-color);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: var(--deep-sea);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 18px; }

        /* 上传按钮样式 */
        .upload-btn {
            background-color: var(--sea-salt-blue);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 核心预览区（Canvas/图片容器） */
        .preview-area {
            flex: 1; /* 占据剩余主要空间 */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0; /* 预览区背景色，区分拼图 */
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* 模拟的拼图容器 */
        #puzzle-canvas-mock {
            width: 100%;
            height: 100%;
            background-color: var(--panel-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            position: relative; /* 用于水印定位 */
        }

        /* 水印/贴纸的样式 */
        .watermark-element {
            position: absolute;
            max-width: 80px;
            max-height: 80px;
            opacity: 0.7; /* 默认透明度 */
            cursor: move; /* 提示可拖拽 */
            border: 1px dashed transparent;
        }
        
        .watermark-element:hover {
            border-color: var(--deep-sea);
        }

        /* 底部工具栏 */
        .toolbar {
            background-color: var(--panel-color);
            border-top: 1px solid #eee;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--deep-sea);
            border-left: 3px solid var(--sea-salt-blue);
            padding-left: 8px;
        }

        /* 按钮和选项 */
        .btn-group { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }

        button.opt-btn {
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        button.opt-btn.active {
            background-color: var(--sea-salt-blue);
            color: white;
            border-color: var(--sea-salt-blue);
        }

        /* 水印图片上传区域 */
        .watermark-uploader {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 价格和下载 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .price-tag { font-size: 20px; color: #e67e22; font-weight: bold; }
        .download-btn {
            background-color: var(--deep-sea);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="phone-container">
    
    <header>
        <h1>海盐拼图 • 竖屏版</h1>
        <label for="imageInput" class="upload-btn">上传图片</label>
        <input type="file" multiple id="imageInput" style="display:none;">
    </header>

    <div class="preview-area">
        <div id="puzzle-canvas-mock">
            <p>图片预览区域</p>
            <p style="font-size: 12px;">(当前已选: <span id="image-count">0</span> 张)</p>
            </div>
    </div>

    <div class="toolbar">
        
        <div class="tool-section">
            <h3>1. 选择比例 (竖屏)</h3>
            <div class="btn-group">
                <button class="opt-btn active">3:4 (经典)</button>
                <button class="opt-btn">1:1 (正方形)</button>
                <button class="opt-btn">9:16 (手机全屏)</button>
            </div>
        </div>

        <div class="tool-section">
            <h3>2. 添加自定义图片水印</h3>
            <div class="watermark-uploader">
                <label for="watermarkInput" class="opt-btn" style="background-color: #e9e9e9; border: 1px solid #ccc;">
                    选择水印图片...
                </label>
                <input type="file" id="watermarkInput" accept="image/*" style="display:none;">
                <span style="font-size: 12px; color: #999;">(支持 PNG/JPG)</span>
            </div>
        </div>

        <div class="action-bar">
            <div>
                <div style="font-size: 12px; color: #999;">预估价格</div>
                <div class="price-tag">¥ 1.50</div>
            </div>
            <button class="download-btn">生成高清图</button>
        </div>

    </div>
</div>

<script>
    // --- 核心逻辑：添加自定义图片水印 ---

    const watermarkInput = document.getElementById('watermarkInput');
    const previewCanvas = document.getElementById('puzzle-canvas-mock');

    watermarkInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {
            // 1. 创建水印图片元素
            const img = document.createElement('img');
            img.src = event.target.result;
            img.classList.add('watermark-element');
            
            // 2. 默认初始位置 (例如，右下角)
            img.style.bottom = '10px';
            img.style.right = '10px';

            // 3. 将水印添加到预览区
            // 注意：在实际开发中，需要处理"移除旧水印"或"允许多个水印"的逻辑
            // 这里我们先移除旧的水印以保持页面干净
            const oldWatermark = previewCanvas.querySelector('.watermark-element');
            if(oldWatermark) previewCanvas.removeChild(oldWatermark);

            previewCanvas.appendChild(img);
            
            alert('自定义水印已添加！在 Canvas 技术实现中，你可以拖动它。');
        };

        reader.readAsDataURL(file);
    });

    // --- 其他基础交互 (图片计数) ---
    const imageInput = document.getElementById('imageInput');
    const countDisplay = document.getElementById('image-count');
    imageInput.onchange = (e) => {
        countDisplay.innerText = e.target.files.length;
    };
</script>

</body>
</html>
