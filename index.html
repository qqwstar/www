<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Salt Pro - 复盘工坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --sea-salt: #A8D1E7;
            --deep-sea: #5B8DA5;
            --price-orange: #FF7E5F;
            --bg-light: #F4F7F9;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background-color: var(--bg-light);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- 顶部工具栏 --- */
        header {
            background: #fff; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .upload-btn {
            background: var(--sea-salt); color: white; padding: 8px 15px;
            border-radius: 20px; font-size: 0.85rem; cursor: pointer;
        }

        /* --- 主容器 --- */
        .app-body { flex: 1; display: flex; overflow: hidden; padding: 15px; gap: 15px; }

        /* 左侧面板：控制区 */
        .side-panel { width: 280px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-label { font-size: 0.8rem; color: #999; margin-bottom: 10px; display: block; }

        /* 右侧面板：预览区 */
        .preview-pane {
            flex: 1; background: #fff; border-radius: 12px;
            display: flex; justify-content: center; align-items: flex-start;
            overflow-y: auto; padding: 40px 20px 300px 20px; /* 底部留白确保不被按钮遮挡 */
        }

        /* --- 核心拼图容器 --- */
        #puzzle-container {
            display: grid;
            width: 100%; max-width: 600px;
            gap: 10px; background: #fff; padding: 10px;
        }

        .grid-slot {
            position: relative; overflow: hidden;
            background: #f9f9f9; border-radius: 4px;
            width: 100%; aspect-ratio: 1 / 1; /* 默认 1:1 */
        }

        .grid-slot img.main-img {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }

        /* 比例切换 */
        .ratio-4-3 .grid-slot { aspect-ratio: 4 / 3; }
        .ratio-1-1 .grid-slot { aspect-ratio: 1 / 1; }
        .ratio-9-16 .grid-slot { aspect-ratio: 9 / 16; }

        /* --- 替换后的“卖掉了”印章 --- */
        .sold-seal {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.1); /* 轻微压暗底层图 */
            display: none; align-items: center; justify-content: center; z-index: 20;
        }
        .sold-seal img {
            width: 85%; height: auto;
            transform: rotate(-5deg);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .grid-slot.is-sold .sold-seal { display: flex; }

        /* 价格标签 */
        .price-tag {
            position: absolute; top: 10px; right: 10px;
            background: var(--deep-sea); color: white;
            padding: 3px 10px; border-radius: 15px;
            font-size: 0.75rem; font-weight: bold;
            display: none; z-index: 25;
        }
        .grid-slot.show-price .price-tag { display: block; }

        /* 槽位内置操作钮 */
        .slot-controls {
            position: absolute; bottom: 8px; right: 8px;
            display: flex; gap: 6px; z-index: 30;
        }
        .ctrl-btn {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.9); border: none;
            color: var(--deep-sea); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 底部固定保存栏 */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #eee;
            padding: 20px; display: flex; gap: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .save-btn {
            flex: 1; background: var(--price-orange); color: white;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }

        /* 提示弹窗 */
        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 30px;
            border-radius: 30px; z-index: 9999; display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <b style="color:var(--deep-sea)">Sea Salt Pro</b>
        <label class="upload-btn">
            批量导入素材 <input type="file" id="imgInput" multiple accept="image/*" hidden>
        </label>
    </div>
    <div id="status-text" style="font-size: 0.8rem; color: #999;">等待图片导入...</div>
</header>

<div class="app-body">
    <div class="side-panel">
        <div class="card">
            <span class="card-label">拼图比例</span>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <button onclick="setRatio('ratio-4-3')" class="opt-btn">4:3</button>
                <button onclick="setRatio('ratio-1-1')" class="opt-btn">1:1</button>
                <button onclick="setRatio('ratio-9-16')" class="opt-btn">9:16</button>
            </div>
        </div>
        <div class="card">
            <span class="card-label">单价设置 (¥)</span>
            <input type="number" id="globalPrice" value="99.00" step="1" 
                   style="width:100%; border:1px solid #eee; padding:10px; border-radius:8px; font-weight:bold; color:var(--price-orange);"
                   oninput="syncAllPrices()">
        </div>
    </div>

    <div class="preview-pane">
        <div id="puzzle-container" class="ratio-1-1">
            </div>
    </div>
</div>

<div class="bottom-bar">
    <button class="save-btn" onclick="saveToGallery()">
        <i class="fas fa-download"></i> 生成高清图并保存至相册
    </button>
</div>

<div id="toast"></div>

<script>
    const container = document.getElementById('puzzle-container');
    const imgInput = document.getElementById('imgInput');
    const priceInput = document.getElementById('globalPrice');
    const toast = document.getElementById('toast');

    // “卖掉了”印章图片的 Base64 地址 (这里我使用了你提供的印章特征)
    // 为了保证离线和下载可用，建议使用 Base64 或完整的 URL
    const soldSealUrl = "https://i.postimg.cc/85z1zX6j/image.png"; // 请确保这个链接指向你刚才发的印章图

    imgInput.addEventListener('change', function() {
        const files = Array.from(this.files);
        if(!files.length) return;

        // --- 核心：多张图片自动适配逻辑 ---
        // 2-4张用2列，5-9张用3列，10张以上用4列
        let cols = 2;
        if(files.length > 4) cols = 3;
        if(files.length > 9) cols = 4;
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        
        container.innerHTML = '';
        document.getElementById('status-text').innerText = `已导入 ${files.length} 张素材`;

        files.forEach((file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                slot.innerHTML = `
                    <div class="sold-seal"><img src="${soldSealUrl}"></div>
                    <div class="price-tag">¥ ${priceInput.value}</div>
                    <div class="slot-controls">
                        <button class="ctrl-btn" onclick="togglePrice(this)"><i class="fas fa-tag"></i></button>
                        <button class="ctrl-btn" onclick="toggleSold(this)"><i class="fas fa-check"></i></button>
                    </div>
                    <img src="${e.target.result}" class="main-img">
                `;
                container.appendChild(slot);

                // 自由裁剪拖拽
                const img = slot.querySelector('.main-img');
                let offset = { x: 0, y: 0 };
                interact(slot).draggable({
                    listeners: { move(event) {
                        offset.x += event.dx; offset.y += event.dy;
                        img.style.objectPosition = `${50 + offset.x/2}% ${50 + offset.y/2}%`;
                    }}
                });
            };
            reader.readAsDataURL(file);
        });
    });

    function toggleSold(btn) {
        btn.closest('.grid-slot').classList.toggle('is-sold');
    }

    function togglePrice(btn) {
        btn.closest('.grid-slot').classList.toggle('show-price');
    }

    function setRatio(r) {
        container.className = r;
    }

    function syncAllPrices() {
        document.querySelectorAll('.price-tag').forEach(tag => {
            tag.innerText = `¥ ${priceInput.value}`;
        });
    }

    function showToast(msg) {
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // --- 核心：保存至相册逻辑 ---
    async function saveToGallery() {
        if(!container.children.length) return alert("请先导入图片");
        
        showToast("正在导出高清图...");

        // 下载前暂时隐藏操作按钮
        const ctrls = document.querySelectorAll('.slot-controls');
        ctrls.forEach(c => c.style.display = 'none');

        try {
            const canvas = await html2canvas(container, {
                useCORS: true,
                scale: 2, // 2倍采样，保证打印级别清晰度
                backgroundColor: '#ffffff'
            });

            const link = document.createElement('a');
            link.download = `SeaSalt_Puzzle_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            showToast("✅ 已触发保存！请在浏览器下载或相册查看");
        } catch (err) {
            alert("保存失败，请尝试截图");
        } finally {
            ctrls.forEach(c => c.style.display = 'flex');
        }
    }
</script>

</body>
</html>
