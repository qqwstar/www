<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>海盐蓝拼图工坊</title>
    <style>
        :root {
            --sea-salt-blue: #A8D1E7;
            --deep-sea: #5B8DA5;
            --bg-color: #F0F7FA;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 导航栏 */
        header {
            width: 100%;
            padding: 20px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            color: var(--deep-sea);
        }

        /* 主容器 */
        .container {
            display: flex;
            max-width: 1200px;
            width: 95%;
            margin: 30px auto;
            gap: 20px;
        }

        /* 控制面板 */
        .controls {
            flex: 1;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(168, 209, 231, 0.2);
        }

        /* 预览区 */
        .preview-area {
            flex: 2;
            background: #fff;
            min-height: 500px;
            border-radius: 15px;
            border: 2px dashed var(--sea-salt-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        h3 { color: var(--deep-sea); border-left: 4px solid var(--sea-salt-blue); padding-left: 10px; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }

        button {
            background-color: var(--sea-salt-blue);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: var(--deep-sea); }

        .price-tag {
            font-size: 24px;
            color: #e67e22;
            font-weight: bold;
            margin-top: 20px;
        }

        .sticker-item {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 1px solid #eee;
            margin-right: 10px;
            cursor: pointer;
            text-align: center;
            line-height: 50px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sea Salt Puzzle Studio | 海盐蓝拼图工坊</h1>
</header>

<div class="container">
    <div class="controls">
        <h3>1. 选择比例</h3>
        <div class="btn-group">
            <button>1:1 正方形</button>
            <button>3:4 经典</button>
            <button>16:9 宽屏</button>
        </div>

        <h3>2. 图片张数 (多选)</h3>
        <input type="file" multiple id="imageInput" style="margin-bottom: 15px;">
        <p>当前选择: <span id="count">0</span> 张</p>

        <h3>3. 一键贴纸/水印</h3>
        <div class="btn-group">
            <div class="sticker-item">🌿</div>
            <div class="sticker-item">✨</div>
            <div class="sticker-item">COPY</div>
        </div>

        <h3>4. 服务定价</h3>
        <div class="price-tag">¥ 0.00</div>
        <button style="width: 100%; margin-top: 10px; background: var(--deep-sea);">立即生成并下载</button>
    </div>

    <div class="preview-area" id="preview">
        <p style="color: #999;">图片预览区域 (Canvas 渲染)</p>
    </div>
</div>

<script>
    // 基础交互逻辑
    const input = document.getElementById('imageInput');
    const countDisplay = document.getElementById('count');
    
    input.onchange = (e) => {
        const files = e.target.files;
        countDisplay.innerText = files.length;
        // 这里可以接入 Canvas API 进行图片拼接预览
        alert('成功导入 ' + files.length + ' 张图片！');
    };
</script>

</body>
</html>
