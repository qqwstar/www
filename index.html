<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>角色卡画廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"/>
<script>
tailwind.config={
  theme:{
    extend:{
      colors:{
        prim:'#a855f7',
        darkBg:'#0f0f1b'
      }
    }
  }
}
</script>
<style>
body{background:#0f0f1b;}
.page{display:none;}
.page.active{display:block;}
.card-hover{transition:0.3s ease;}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 10px 30px #a855f733;}
/* 底部中间加号凸起 */
.plus-btn{transform: translateY(-12px);}
</style>
</head>
<body class="text-white pb-24">

<!-- 画廊首页(默认进入) -->
<div id="homePage" class="page active">
  <header class="py-6 text-center">
    <h1 class="text-3xl font-bold text-fuchsia-400">角色卡画廊</h1>
    <p class="text-gray-400 mt-1">浏览全部角色</p>
  </header>

  <div class="max-w-6xl mx-auto px-4">
    <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
      <!--角色卡JS渲染-->
    </div>
  </div>
</div>

<!-- 个人主页 -->
<div id="userPage" class="page">
  <div class="max-w-xl mx-auto px-4 pt-10">
    <div class="bg-white/10 rounded-2xl p-6 text-center backdrop-blur">
      <div class="w-24 h-24 rounded-full bg-fuchsia-500 mx-auto flex items-center justify-center text-4xl">
        <i class="fa fa-user"></i>
      </div>
      <h2 class="text-2xl mt-4 font-bold">我的主页</h2>
      <p class="text-gray-300 mt-2">已上传角色：<span id="cardCount">0</span></p>
    </div>
    <h3 class="mt-8 text-xl">我的合集</h3>
    <div id="myCardGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-4">
    </div>
  </div>
</div>

<!-- 底部导航 【首页 | 中间+ | 我的】 -->
<div class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 flex items-center justify-around py-2 z-40">
  <button onclick="switchPage('home')" class="flex-1 py-3 text-center">
    <i class="fa fa-th-large block text-xl"></i>
    <span class="text-sm">首页</span>
  </button>
  <!-- 中间凸起加号 打开上传弹窗 -->
  <button onclick="openUploadModal()" class="plus-btn w-14 h-14 rounded-full bg-fuchsia-500 flex items-center justify-center text-2xl">
    <i class="fa fa-plus"></i>
  </button>
  <button onclick="switchPage('user')" class="flex-1 py-3 text-center">
    <i class="fa fa-user block text-xl"></i>
    <span class="text-sm">我的</span>
  </button>
</div>

<!-- 上传弹窗 -->
<div id="uploadModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-gray-900 w-full max-w-md rounded-2xl p-6">
    <h2 class="text-xl mb-4 font-bold">上传新角色卡</h2>
    <input type="file" id="imgUpload" accept="image/*" class="w-full bg-gray-800 rounded-lg p-3 mb-3">
    <textarea id="descInput" rows="4" class="w-full bg-gray-800 rounded-lg p-3 resize-none rounded-lg outline-none" placeholder="角色简介..."></textarea>
    <div class="mt-5 flex gap-3">
      <button onclick="closeUploadModal()" class="flex-1 bg-gray-700 py-2 rounded-lg">取消</button>
      <button onclick="addCard()" class="flex-1 bg-fuchsia-500 py-2 rounded-lg">提交</button>
    </div>
  </div>
</div>

<!-- 角色详情弹窗 -->
<div id="detailModal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4">
  <div class="max-w-lg w-full">
    <button onclick="closeDetailModal()" class="float-right text-3xl mb-4"><i class="fa fa-times"></i></button>
    <img id="modalImg" class="w-full max-h-[70vh] object-contain rounded-xl">
    <p id="modalDesc" class="mt-5 text-gray-300 whitespace-pre-wrap"></p>
  </div>
</div>

<script>
let tempImg = "";

// 本地存储
function getCards(){
  return JSON.parse(localStorage.getItem("roleCards"))||[];
}
function saveCards(arr){
  localStorage.setItem("roleCards",JSON.stringify(arr));
}

//页面切换
function switchPage(type){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  if(type==='home') renderHomeCards(), document.getElementById('homePage').classList.add('active');
  if(type==='user') renderUserPage(), document.getElementById('userPage').classList.add('active');
}

//上传弹窗控制
function openUploadModal(){
  document.getElementById('uploadModal').classList.remove('hidden');
}
function closeUploadModal(){
  document.getElementById('uploadModal').classList.add('hidden');
  tempImg = "";
  document.getElementById("imgUpload").value="";
  document.getElementById("descInput").value="";
}

//图片读取
document.getElementById("imgUpload").addEventListener("change",e=>{
  let f = e.target.files[0];
  if(!f)return;
  let r = new FileReader();
  r.onload = ev => tempImg = ev.target.result;
  r.readAsDataURL(f);
})

//新增角色
function addCard(){
  let desc = document.getElementById("descInput").value.trim();
  if(!tempImg) return alert("请选择角色图片");
  if(!desc) return alert("请填写简介");
  let list = getCards();
  list.push({img:tempImg, desc:desc, id:Date.now()});
  saveCards(list);
  closeUploadModal();
  renderHomeCards();
}

//首页画廊渲染
function renderHomeCards(){
  let list = getCards();
  let wrap = document.getElementById("cardGrid");
  wrap.innerHTML="";
  list.forEach(item=>{
    let div = document.createElement('div');
    div.className = "bg-gray-800 rounded-xl overflow-hidden card-hover cursor-pointer";
    div.onclick = ()=>openDetail(item.img, item.desc);
    div.innerHTML=`
      <img src="${item.img}" class="w-full h-52 object-cover">
      <div class="p-3">
        <p class="text-sm text-gray-300 line-clamp-2">${item.desc}</p>
      </div>
    `;
    wrap.appendChild(div);
  })
}

//个人页渲染
function renderUserPage(){
  let list = getCards();
  document.getElementById("cardCount").innerText = list.length;
  let wrap = document.getElementById("myCardGrid");
  wrap.innerHTML="";
  list.forEach(item=>{
    let d = document.createElement('div');
    d.className="bg-gray-800 rounded-xl overflow-hidden cursor-pointer";
    d.onclick=()=>openDetail(item.img,item.desc);
    d.innerHTML = `<img src="${item.img}" class="w-full h-40 object-cover">`;
    wrap.appendChild(d);
  })
}

//详情弹窗
function openDetail(img,txt){
  document.getElementById("modalImg").src=img;
  document.getElementById("modalDesc").innerText=txt;
  document.getElementById("detailModal").classList.remove('hidden');
}
function closeDetailModal(){
  document.getElementById("detailModal").classList.add('hidden');
}

//默认加载画廊首页
window.onload = renderHomeCards();
</script>
</body>
</html>
