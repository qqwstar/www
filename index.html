<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Salt Grid - With Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --sea-salt: #A8D1E7;
            --deep-sea: #5B8DA5;
            --price-orange: #FF7E5F;
            --sold-red: rgba(255, 71, 87, 0.85);
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background: var(--sea-salt); margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        header {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.95); z-index: 1000; flex-shrink: 0;
        }

        .preview-wrapper {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
            padding: 20px 0 320px 0;
        }

        #puzzle-canvas-root {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 94%; max-width: 600px;
            background: var(--sea-salt); /* 下载后的背景色 */
        }

        .grid-slot {
            position: relative; overflow: hidden; background: #fff; border-radius: 8px; width: 100%;
        }

        .grid-slot img { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        .ratio-4-3 .grid-slot { aspect-ratio: 4 / 3; }
        .ratio-1-1 .grid-slot { aspect-ratio: 1 / 1; }
        .ratio-9-16 .grid-slot { aspect-ratio: 9 / 16; }

        /* 卖掉了蒙层 */
        .sold-overlay {
            position: absolute; inset: 0; background: var(--sold-red);
            display: none; align-items: center; justify-content: center; z-index: 20;
        }
        .sold-overlay span {
            color: white; font-size: 1.2rem; font-weight: bold;
            border: 2px solid white; padding: 2px 8px; transform: rotate(-15deg);
        }
        .grid-slot.is-sold .sold-overlay { display: flex; }

        /* 价格标签 */
        .price-badge {
            position: absolute; top: 10px; right: 10px; background: var(--deep-sea); color: white;
            padding: 2px 8px; border-radius: 10px; display: none; z-index: 10; font-size: 0.8rem;
        }
        .grid-slot.show-price .price-badge { display: block; }

        /* 操作按钮 */
        .slot-tools { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 5px; z-index: 30; }
        .tool-btn {
            width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center; color: var(--deep-sea); cursor: pointer;
        }

        /* --- 弹窗提示样式 --- */
        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 12px; z-index: 9999; display: none; text-align: center; line-height: 1.6;
        }

        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 20px;
            border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 2000;
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .opt-btn { flex: 1; padding: 10px; border: none; background: #f0f4f7; border-radius: 10px; font-size: 0.8rem; }
        .opt-btn.active { background: var(--deep-sea); color: white; }

        .save-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            background: var(--price-orange); color: white; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <b style="color: var(--deep-sea);">Sea Salt Grid</b>
    <label style="background: var(--deep-sea); color: white; padding: 6px 15px; border-radius: 15px; font-size: 0.8rem;">
        导入图片 <input type="file" id="imgInput" multiple accept="image/*" hidden>
    </label>
</header>

<div id="toast"></div>

<div class="preview-wrapper">
    <div id="puzzle-canvas-root" class="ratio-4-3"></div>
</div>

<div class="bottom-panel">
    <div class="btn-group">
        <button class="opt-btn active" onclick="setRatio(this, 'ratio-4-3')">4:3</button>
        <button class="opt-btn" onclick="setRatio(this, 'ratio-1-1')">1:1</button>
        <button class="opt-btn" onclick="setRatio(this, 'ratio-9-16')">9:16</button>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="number" id="unitPrice" style="width:70px; padding:10px; border:1px solid #eee; border-radius:8px;" value="99" oninput="syncPrices()">
        <button class="save-btn" onclick="downloadPuzzle()">保存全图到手机</button>
    </div>
</div>

<script>
    const canvasRoot = document.getElementById('puzzle-canvas-root');
    const unitPriceInput = document.getElementById('unitPrice');
    const toast = document.getElementById('toast');

    function showToast(msg) {
        toast.innerHTML = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    document.getElementById('imgInput').addEventListener('change', function() {
        const files = Array.from(this.files);
        const cols = files.length <= 2 ? 1 : (files.length <= 4 ? 2 : 3);
        canvasRoot.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        canvasRoot.innerHTML = '';

        files.forEach((file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                slot.innerHTML = `
                    <div class="sold-overlay"><span>卖掉了</span></div>
                    <div class="price-badge">¥ ${unitPriceInput.value}</div>
                    <div class="slot-tools">
                        <div class="tool-btn" onclick="event.stopPropagation();this.closest('.grid-slot').classList.toggle('show-price')"><i class="fas fa-tag"></i></div>
                        <div class="tool-btn" onclick="event.stopPropagation();this.closest('.grid-slot').classList.toggle('is-sold')"><i class="fas fa-check"></i></div>
                    </div>
                    <img src="${e.target.result}" style="object-position: 50% 50%">
                `;
                canvasRoot.appendChild(slot);
                const img = slot.querySelector('img');
                let offset = { x: 0, y: 0 };
                interact(slot).draggable({
                    listeners: { move(event) {
                        offset.x += event.dx; offset.y += event.dy;
                        img.style.objectPosition = `${50 + offset.x/2}% ${50 + offset.y/2}%`;
                    }}
                });
            };
            reader.readAsDataURL(file);
        });
    });

    async function downloadPuzzle() {
        if (!canvasRoot.children.length) return alert("请先上传图片");
        
        showToast('<i class="fas fa-spinner fa-spin"></i> 正在生成高清图...<br>请稍候');

        // 临时隐藏操作按钮以便截图
        const tools = document.querySelectorAll('.slot-tools');
        tools.forEach(t => t.style.visibility = 'hidden');

        try {
            const canvas = await html2canvas(canvasRoot, {
                useCORS: true,
                backgroundColor: '#A8D1E7',
                scale: 2 // 提高清晰度
            });

            const link = document.createElement('a');
            const date = new Date().getTime();
            link.download = `海盐拼图_${date}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            // 核心提示逻辑
            showToast('<b>✅ 下载成功！</b><br>1. 请查看浏览器下载记录<br>2. 或在相册“最近添加”中查找<br>3. 苹果手机请在“文件”App中查看');

        } catch (err) {
            showToast('❌ 保存失败，请尝试截图保存');
        } finally {
            tools.forEach(t => t.style.visibility = 'visible');
        }
    }

    function setRatio(btn, r) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        canvasRoot.className = r;
    }

    function syncPrices() {
        document.querySelectorAll('.price-badge').forEach(b => b.innerText = `¥ ${unitPriceInput.value}`);
    }
</script>
</body>
</html>
