<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Salt Pro - Price Customizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --sea-salt: #A8D1E7;
            --deep-sea: #5B8DA5;
            --white: #FFFFFF;
            --price-orange: #FF7E5F;
            --v-gap: 30px;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background: var(--sea-salt); margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100;
        }

        /* 预览区 */
        .preview-wrapper {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
            padding: 40px 0 180px 0; scroll-behavior: smooth;
        }

        #puzzle-canvas-root {
            display: grid; grid-template-columns: 1fr; gap: var(--v-gap); 
            width: 90%; max-width: 500px; position: relative;
        }

        /* 单个网格槽位 */
        .grid-slot {
            position: relative; overflow: hidden;
            background: #fff; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            cursor: grab; width: 100%;
        }

        .grid-slot img {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }

        /* 比例 */
        .ratio-9-16 .grid-slot { aspect-ratio: 9 / 16; }
        .ratio-1-1 .grid-slot { aspect-ratio: 1 / 1; }

        /* --- 图片上的价格标签 --- */
        .price-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(168, 209, 231, 0.9); color: white;
            padding: 4px 12px; border-radius: 20px; font-weight: bold;
            font-size: 0.9rem; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            display: none; /* 默认隐藏 */
            z-index: 10; pointer-events: none;
        }
        .grid-slot.show-price .price-badge { display: block; }

        /* 标签切换按钮 */
        .tag-toggle {
            position: absolute; top: 15px; left: 15px;
            width: 32px; height: 32px; background: rgba(255,255,255,0.8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--deep-sea); cursor: pointer; z-index: 11; transition: 0.3s;
        }
        .tag-toggle:hover { background: #fff; transform: scale(1.1); }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border-radius: 24px;
            padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(168, 209, 231, 0.4); z-index: 200;
        }

        .config-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .price-input-wrap {
            display: flex; align-items: center; background: #f0f4f7; 
            padding: 5px 12px; border-radius: 10px; flex: 1;
        }
        .price-input-wrap input {
            background: transparent; border: none; outline: none;
            width: 100%; color: var(--price-orange); font-weight: bold; font-size: 1rem;
        }

        .tab-btn {
            background: #f0f4f7; border: none; padding: 10px; border-radius: 10px;
            font-size: 0.75rem; color: #555; cursor: pointer; flex: 1;
        }
        .tab-btn.active { background: var(--deep-sea); color: white; }

        .action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .total-price { color: var(--price-orange); font-size: 1.5rem; font-weight: bold; }
        .save-btn {
            background: var(--sea-salt); color: #fff; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--deep-sea);">Sea Salt Editor</div>
    <label style="color: var(--deep-sea); font-size: 0.85rem; cursor: pointer; background: #fff; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--sea-salt);">
        <i class="fas fa-images"></i> 选择图片
        <input type="file" id="imgInput" multiple accept="image/*" hidden>
    </label>
</header>

<div class="preview-wrapper">
    <div id="puzzle-canvas-root" class="ratio-9-16">
        <div id="empty-hint" style="color:white; text-align:center; padding-top: 100px; opacity: 0.6;">
            <p>点击上方“选择图片”开始预览</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="config-row">
        <div class="price-input-wrap">
            <span style="font-size: 0.8rem; color: #888; margin-right: 5px;">单价 ¥</span>
            <input type="number" id="unitPrice" value="5.00" step="0.5" oninput="updateAllPrices()">
        </div>
        <button class="tab-btn active" id="ratio-toggle" onclick="toggleRatio()">切换 1:1 / 9:16</button>
    </div>

    <div class="action-row">
        <div>
            <div style="font-size: 0.7rem; color: #aaa;">自动计算总额</div>
            <div class="total-price">¥ <span id="total-val">0.00</span></div>
        </div>
        <button class="save-btn" onclick="alert('高清图片已准备好！')">保存作品</button>
    </div>
</div>

<script>
    const canvasRoot = document.getElementById('puzzle-canvas-root');
    const imgInput = document.getElementById('imgInput');
    const unitPriceInput = document.getElementById('unitPrice');
    let imgFiles = [];

    imgInput.addEventListener('change', function() {
        imgFiles = Array.from(this.files);
        if(!imgFiles.length) return;
        renderGrid();
    });

    function renderGrid() {
        document.getElementById('empty-hint').style.display = 'none';
        canvasRoot.querySelectorAll('.grid-slot').forEach(s => s.remove());

        imgFiles.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                
                // 价格标签
                const badge = document.createElement('div');
                badge.className = 'price-badge';
                badge.innerText = `¥ ${parseFloat(unitPriceInput.value).toFixed(2)}`;
                
                // 一键添加价格按钮
                const toggle = document.createElement('div');
                toggle.className = 'tag-toggle';
                toggle.innerHTML = '<i class="fas fa-tag"></i>';
                toggle.onclick = (ev) => {
                    ev.stopPropagation();
                    slot.classList.toggle('show-price');
                };

                const img = document.createElement('img');
                img.src = e.target.result;
                
                slot.appendChild(toggle);
                slot.appendChild(badge);
                slot.appendChild(img);
                canvasRoot.appendChild(slot);

                // 拖拽
                let offset = { x: 0, y: 0 };
                interact(slot).draggable({
                    listeners: { move(event) {
                        offset.x += event.dx; offset.y += event.dy;
                        img.style.objectPosition = `${50 + offset.x/2}% ${50 + offset.y/2}%`;
                    }}
                });
            };
            reader.readAsDataURL(file);
        });
        updateTotal();
    }

    // 实时更新所有图片上的价格和总额
    function updateAllPrices() {
        const val = parseFloat(unitPriceInput.value) || 0;
        document.querySelectorAll('.price-badge').forEach(b => {
            b.innerText = `¥ ${val.toFixed(2)}`;
        });
        updateTotal();
    }

    function updateTotal() {
        const unit = parseFloat(unitPriceInput.value) || 0;
        document.getElementById('total-val').innerText = (imgFiles.length * unit).toFixed(2);
    }

    function toggleRatio() {
        canvasRoot.classList.toggle('ratio-9-16');
        canvasRoot.classList.toggle('ratio-1-1');
    }
</script>
</body>
</html>
