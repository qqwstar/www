<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Salt Blue Puzzle Maker - Top Preview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --sea-salt-main: #A8D1E7;
            --sea-salt-deep: #5B8DA5;
            --bg-light: #F4F7F9;
            --white: #FFFFFF;
            --border: #E1E8ED;
            --price-orange: #FF7E5F;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background: var(--bg-light); margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 顶部导航 */
        header {
            background: var(--white); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }

        .header-logo { color: var(--sea-salt-deep); font-weight: bold; font-size: 1rem; }
        .header-actions { display: flex; gap: 15px; color: #888; font-size: 1.1rem; }

        /* --- 预览区域：放在最上方 --- */
        .preview-wrapper {
            background: #E9F0F4; flex: 1; /* 占据剩余空间 */
            display: flex; justify-content: center; align-items: center;
            overflow: auto; padding: 20px; position: relative;
        }

        #puzzle-canvas-root {
            display: grid; background: #fff; gap: 2px; /* 还原女帝图细缝 */
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .grid-slot { position: relative; overflow: hidden; background: #f8f8f8; cursor: grab; }
        .grid-slot img { position: absolute; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 比例映射 */
        .ratio-4-3 .grid-slot { aspect-ratio: 4/3; }
        .ratio-1-1 .grid-slot { aspect-ratio: 1/1; }
        .ratio-16-9 .grid-slot { aspect-ratio: 16/9; }

        /* 水印 */
        #wm-overlay { position: absolute; z-index: 100; display: none; width: 80px; touch-action: none; }
        .wm-del { position: absolute; top: -10px; left: -10px; width: 22px; height: 22px; background: #ff7675; color: white; border-radius: 50%; text-align: center; line-height: 20px; cursor: pointer; }
        .wm-resize { position: absolute; width: 14px; height: 14px; background: var(--sea-salt-deep); border: 2px solid #fff; border-radius: 50%; right: -7px; bottom: -7px; cursor: nwse-resize; }

        /* --- 下方操作面板 --- */
        .controls-panel {
            background: var(--white); border-radius: 24px 24px 0 0;
            padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            max-height: 400px; overflow-y: auto; flex-shrink: 0;
        }

        .tool-card { margin-bottom: 20px; }
        .card-label { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; display: block; }
        
        .btn-row { display: flex; gap: 10px; }
        .opt-btn {
            background: #F0F4F7; border: none; padding: 12px; border-radius: 12px;
            flex: 1; font-size: 0.85rem; color: #555; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .opt-btn.active { background: var(--sea-salt-main); color: white; font-weight: bold; }

        /* 计价与保存 */
        .footer-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #f0f0f0; padding-top: 15px;
        }
        .price-total { color: var(--price-orange); font-size: 1.4rem; font-weight: bold; }
        .save-btn {
            background: var(--sea-salt-deep); color: white; border: none;
            padding: 14px 28px; border-radius: 14px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo"><i class="fas fa-layer-group"></i> Sea Salt Blue Puzzle</div>
    <div class="header-actions">
        <i class="fas fa-redo-alt icon-btn" onclick="location.reload()"></i>
        <i class="fas fa-trash-alt icon-btn" style="color:#ff7675"></i>
    </div>
</header>

<div class="preview-wrapper">
    <div id="puzzle-canvas-root" class="ratio-4-3">
        <div id="wm-overlay">
            <div class="wm-del" onclick="removeWM()">×</div>
            <img id="wm-img" src="" alt="" style="width:100%; height:100%; object-fit:contain; pointer-events:none;">
            <div class="wm-resize"></div>
        </div>
        <div id="empty-hint" style="color:#9bb5c7; text-align:center;">
            <i class="fas fa-cloud-upload-alt" style="font-size:2rem; display:block; margin-bottom:10px;"></i>
            请先在下方上传素材
        </div>
    </div>
</div>

<div class="controls-panel">
    <div class="tool-card">
        <span class="card-label">Step 1. 选择素材图片</span>
        <label class="opt-btn" style="background:var(--sea-salt-main); color:white; width:100%; box-sizing:border-box;">
            <i class="fas fa-plus"></i> 点击上传图片 (支持多选)
            <input type="file" id="imgInput" multiple accept="image/*" hidden>
        </label>
    </div>

    <div class="tool-card">
        <span class="card-label">Step 2. 切换网格比例</span>
        <div class="btn-row">
            <button class="opt-btn active" onclick="setRatio(this, 'ratio-4-3')">4 : 3</button>
            <button class="opt-btn" onclick="setRatio(this, 'ratio-1-1')">1 : 1</button>
            <button class="opt-btn" onclick="setRatio(this, 'ratio-16-9')">16 : 9</button>
        </div>
    </div>

    <div class="tool-card">
        <span class="card-label">Step 3. 水印贴纸管理</span>
        <div class="btn-row">
            <label class="opt-btn" style="background:#fff; border:1px dashed var(--sea-salt-main); color:var(--sea-salt-deep);">
                <i class="fas fa-stamp"></i> 自定义水印
                <input type="file" id="wmInput" accept="image/*" hidden>
            </label>
        </div>
    </div>

    <div class="footer-bar">
        <div>
            <div style="font-size:0.7rem; color:#aaa; margin-bottom:4px;">线性计费 (¥5/格)</div>
            <div class="price-total">¥ <span id="total-val">0.00</span></div>
        </div>
        <button class="save-btn" onclick="alert('正在生成高清图...')">保存并下载</button>
    </div>
</div>

<script>
    const canvasRoot = document.getElementById('puzzle-canvas-root');
    const imgInput = document.getElementById('imgInput');
    const wmOverlay = document.getElementById('wm-overlay');
    const wmImg = document.getElementById('wm-img');
    let wmPos = { x: 30, y: 30 };

    // --- 动态多宫格逻辑 ---
    imgInput.addEventListener('change', function() {
        const files = Array.from(this.files);
        if(!files.length) return;

        document.getElementById('total-val').innerText = (files.length * 5).toFixed(2);
        document.getElementById('empty-hint').style.display = 'none';

        // 计算行列 (3-4张=2列, 5-9张=3列)
        const count = files.length;
        const cols = Math.ceil(Math.sqrt(count));
        
        // 动态宽度计算，适应手机屏幕
        const baseWidth = window.innerWidth > 500 ? 500 : window.innerWidth - 60;
        const slotWidth = baseWidth / cols;

        canvasRoot.style.gridTemplateColumns = `repeat(${cols}, ${slotWidth}px)`;
        canvasRoot.querySelectorAll('.grid-slot').forEach(s => s.remove());

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                const img = document.createElement('img');
                img.src = e.target.result;
                
                slot.appendChild(img);
                canvasRoot.appendChild(slot);

                // 单格裁剪拖拽
                let offset = { x: 0, y: 0 };
                interact(slot).draggable({
                    listeners: {
                        move(event) {
                            offset.x += event.dx; offset.y += event.dy;
                            img.style.objectPosition = `${50 + offset.x/2}% ${50 + offset.y/2}%`;
                        }
                    }
                });
            };
            reader.readAsDataURL(file);
        });
    });

    // --- 比例设置 ---
    function setRatio(btn, r) {
        document.querySelectorAll('.btn-row .opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        canvasRoot.className = r;
    }

    // --- 水印资产 ---
    window.onload = () => {
        const saved = localStorage.getItem('sea-salt-wm-pro');
        if(saved) loadWM(saved);
    };

    document.getElementById('wmInput').addEventListener('change', function() {
        const reader = new FileReader();
        reader.onload = (e) => {
            loadWM(e.target.result);
            localStorage.setItem('sea-salt-wm-pro', e.target.result);
        };
        reader.readAsDataURL(this.files[0]);
    });

    function loadWM(src) {
        wmImg.src = src;
        wmOverlay.style.display = 'block';
        wmOverlay.style.transform = `translate(${wmPos.x}px, ${wmPos.y}px)`;
    }

    function removeWM() {
        wmOverlay.style.display = 'none';
        localStorage.removeItem('sea-salt-wm-pro');
    }

    // 水印高级交互
    interact('#wm-overlay')
        .draggable({
            listeners: { move(event) {
                wmPos.x += event.dx; wmPos.y += event.dy;
                event.target.style.transform = `translate(${wmPos.x}px, ${wmPos.y}px)`;
            }},
            modifiers: [interact.modifiers.restrictRect({ restriction: 'parent' })]
        })
        .resizable({
            edges: { right: '.wm-resize', bottom: '.wm-resize' },
            listeners: { move(event) {
                Object.assign(event.target.style, {
                    width: `${event.rect.width}px`, height: `${event.rect.height}px`
                });
            }},
            modifiers: [interact.modifiers.aspectRatio({ ratio: 'preserve' })]
        });
</script>
</body>
</html>
