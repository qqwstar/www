<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海盐蓝高级拼图工坊</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --sea-salt-blue: #A8D1E7;
            --deep-sea: #5B8DA5;
            --bg-light: #F0F7FA;
            --white: #FFFFFF;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background-color: var(--sea-salt-blue);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        /* 竖屏容器 */
        .phone-frame {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 顶部控制栏 */
        header {
            background: var(--white);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(168, 209, 231, 0.3);
        }

        .logo { color: var(--deep-sea); font-weight: bold; font-size: 1.1rem; }

        /* 图片预览区域 (滚动显示长图) */
        #preview-scroll-box {
            flex: 1;
            overflow-y: auto;
            background: #E5EFF5;
            padding: 15px;
            position: relative; /* 为水印定位 */
            display: flex;
            flex-direction: column;
            gap: 5px; /* 拼图间隙 */
        }

        .preview-img {
            width: 100%;
            display: block;
            border-radius: 4px;
            pointer-events: none; /* 防止图片干扰水印拖拽 */
        }

        /* 可拖拽水印样式 */
        #draggable-watermark {
            position: absolute;
            z-index: 100;
            cursor: move;
            touch-action: none;
            user-select: none;
            max-width: 100px;
            border: 2px dashed rgba(255,255,255,0.5);
            padding: 2px;
            display: none; /* 初始隐藏 */
        }

        /* 底部工具面板 */
        .bottom-panel {
            background: var(--white);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .control-group { margin-bottom: 15px; }
        .control-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; display: block; }

        .btn-row { display: flex; gap: 10px; }
        .action-btn {
            background: var(--bg-light);
            border: 1px solid var(--sea-salt-blue);
            color: var(--deep-sea);
            padding: 8px 15px;
            border-radius: 8px;
            flex: 1;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
        }

        /* 价格输入框 */
        .price-container {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #FF7E5F;
            font-weight: bold;
        }
        .price-input {
            border: none;
            border-bottom: 1px dashed #FF7E5F;
            color: #FF7E5F;
            font-size: 1.5rem;
            width: 80px;
            outline: none;
            background: transparent;
            font-weight: bold;
        }

        .save-btn {
            background: var(--deep-sea);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-top: 15px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <header>
        <div class="logo">海盐拼图 🧳</div>
        <div style="font-size: 0.8rem; color: var(--deep-sea);">竖屏比例</div>
    </header>

    <div id="preview-scroll-box">
        <img id="draggable-watermark" src="" alt="watermark">
        
        <div id="placeholder-text" style="margin: auto; color: #A8D1E7;">请上传图片开始拼图</div>
    </div>

    <div class="bottom-panel">
        <div class="control-group">
            <span class="control-label">1. 上传拼图素材 (多选)</span>
            <div class="btn-row">
                <label class="action-btn" style="flex:2;">
                    选择图片 <input type="file" id="imageFiles" multiple accept="image/*" hidden>
                </label>
                <div id="file-count" class="action-btn" style="flex:1;">0 张</div>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">2. 上传自定义水印 (可拖动)</span>
            <label class="action-btn">
                添加水印贴纸 <input type="file" id="watermarkFile" accept="image/*" hidden>
            </label>
        </div>

        <div class="control-group" style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <span class="control-label">3. 自定义价格</span>
                <div class="price-container">
                    ¥ <input type="text" class="price-input" value="9.90">
                </div>
            </div>
            <button class="save-btn" style="width: 150px; margin: 0;">保存图片</button>
        </div>
    </div>
</div>

<script>
    // --- 1. 拼图预览功能 ---
    const imageInput = document.getElementById('imageFiles');
    const previewBox = document.getElementById('preview-scroll-box');
    const fileCountText = document.getElementById('file-count');
    const placeholder = document.getElementById('placeholder-text');

    imageInput.addEventListener('change', function() {
        const files = Array.from(this.files);
        if (files.length === 0) return;

        fileCountText.innerText = `${files.length} 张`;
        placeholder.style.display = 'none';
        
        // 清理旧的拼图（保留水印）
        const imgs = previewBox.querySelectorAll('.preview-img');
        imgs.forEach(i => i.remove());

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.classList.add('preview-img');
                previewBox.appendChild(img);
            }
            reader.readAsDataURL(file);
        });
    });

    // --- 2. 自定义水印功能 ---
    const watermarkInput = document.getElementById('watermarkFile');
    const watermarkImg = document.getElementById('draggable-watermark');

    watermarkInput.addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            watermarkImg.src = e.target.result;
            watermarkImg.style.display = 'block';
            watermarkImg.style.transform = 'translate(0px, 0px)'; // 重置位置
            watermarkImg.setAttribute('data-x', 0);
            watermarkImg.setAttribute('data-y', 0);
        };
        reader.readAsDataURL(file);
    });

    // --- 3. 水印拖拽逻辑 (使用 interact.js) ---
    interact('#draggable-watermark').draggable({
        listeners: {
            move (event) {
                const target = event.target;
                // 累加拖拽距离
                const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                // 应用变换
                target.style.transform = `translate(${x}px, ${y}px)`;

                // 保存坐标状态
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }
        },
        modifiers: [
            interact.modifiers.restrictRect({
                restriction: 'parent', // 水印只能在预览框内移动
                endOnly: true
            })
        ]
    });
</script>

</body>
</html>
